<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .result-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 20px;
        }
        
        .score-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin: 30px 0;
        }
        
        .score-number {
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .score-text {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .percentage {
            font-size: 1.5em;
            color: #555;
            margin: 20px 0;
        }
        
        .message {
            color: #666;
            font-size: 1.1em;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1em;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .certificate-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .certificate-id {
            color: #667eea;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-icon" th:if="${result.score >= result.totalQuestions * 0.7}">🎉</div>
        <div class="result-icon" th:if="${result.score < result.totalQuestions * 0.7}">📊</div>
        
        <h1>Quiz Completed!</h1>
        
        <div class="score-display">
            <div class="score-number" th:text="${result.score} + '/' + ${result.totalQuestions}"></div>
            <div class="score-text">Correct Answers</div>
        </div>
        
        <div class="percentage">
            Score: <span th:text="${#numbers.formatDecimal((result.score * 100.0 / result.totalQuestions), 1, 1)}"></span>%
        </div>
        
        <div class="message" th:if="${result.score >= result.totalQuestions * 0.7}">
            Congratulations, <strong th:text="${result.userName}"></strong>! You passed the quiz with flying colors! 🎓
        </div>
        <div class="message" th:if="${result.score < result.totalQuestions * 0.7}">
            Good effort, <strong th:text="${result.userName}"></strong>! Keep practicing to improve your score.
        </div>
        
        <div class="certificate-info" th:if="${result.score >= result.totalQuestions * 0.7}">
            <p style="color: #555; margin-bottom: 10px;">Your Certificate ID:</p>
            <p class="certificate-id" th:text="${result.certificateId}"></p>
        </div>
        
        <div>
            <a th:href="@{/certificate/{id}(id=${result.certificateId})}" 
               class="btn btn-primary"
               th:if="${result.score >= result.totalQuestions * 0.7}">
                View Certificate
            </a>
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
</body>
</html>
