<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .certificate-container {
            background: white;
            max-width: 900px;
            width: 100%;
            padding: 60px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 15px solid #f8f9fa;
            position: relative;
        }
        
        .certificate-border {
            border: 3px solid #667eea;
            padding: 40px;
            position: relative;
        }
        
        .corner-decoration {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 3px solid #764ba2;
        }
        
        .corner-decoration.top-left {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-decoration.top-right {
            top: -3px;
            right: -3px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-decoration.bottom-left {
            bottom: -3px;
            left: -3px;
            border-right: none;
            border-top: none;
        }
        
        .corner-decoration.bottom-right {
            bottom: -3px;
            right: -3px;
            border-left: none;
            border-top: none;
        }
        
        .certificate-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .certificate-title {
            font-size: 3em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .certificate-subtitle {
            font-size: 1.3em;
            color: #666;
            font-style: italic;
        }
        
        .certificate-body {
            text-align: center;
            margin: 40px 0;
        }
        
        .awarded-text {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 20px;
        }
        
        .recipient-name {
            font-size: 2.5em;
            color: #333;
            font-weight: 700;
            margin: 30px 0;
            padding: 20px;
            border-bottom: 3px solid #667eea;
            display: inline-block;
        }
        
        .achievement-text {
            font-size: 1.1em;
            color: #666;
            line-height: 1.8;
            margin: 30px 0;
        }
        
        .score-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: 700;
            margin: 20px 0;
        }
        
        .certificate-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 2px solid #ddd;
        }
        
        .signature-block {
            text-align: center;
            flex: 1;
        }
        
        .signature-line {
            border-top: 2px solid #333;
            margin: 20px 30px 10px;
        }
        
        .signature-label {
            color: #666;
            font-size: 0.9em;
        }
        
        .certificate-id {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .certificate-id-label {
            color: #999;
            font-size: 0.8em;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .certificate-id-value {
            color: #667eea;
            font-family: monospace;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .print-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #667eea;
            padding: 12px 30px;
            border: 2px solid #667eea;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.3s;
        }
        
        .print-btn:hover {
            background: #667eea;
            color: white;
        }
        
        @media print {
            body {
                background: white;
            }
            .print-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="print-btn" onclick="window.print()">🖨️ Print Certificate</button>
    
    <div class="certificate-container">
        <div class="certificate-border">
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>
            
            <div class="certificate-header">
                <div class="certificate-title">Certificate</div>
                <div class="certificate-subtitle">of Achievement</div>
            </div>
            
            <div class="certificate-body">
                <div class="awarded-text">This certificate is proudly presented to</div>
                
                <div class="recipient-name" th:text="${result.userName}"></div>
                
                <div class="achievement-text">
                    For successfully completing the Quiz Engine assessment<br>
                    and demonstrating exceptional knowledge and dedication
                </div>
                
                <div class="score-badge">
                    Score: <span th:text="${result.score}"></span>/<span th:text="${result.totalQuestions}"></span>
                    (<span th:text="${#numbers.formatDecimal((result.score * 100.0 / result.totalQuestions), 1, 1)}"></span>%)
                </div>
                
                <div class="achievement-text">
                    Completed on <span th:text="${#temporals.format(result.completedAt, 'MMMM dd, yyyy')}"></span>
                </div>
            </div>
            
            <div class="certificate-footer">
                <div class="signature-block">
                    <div class="signature-line"></div>
                    <div class="signature-label">Quiz Administrator</div>
                </div>
                <div class="signature-block">
                    <div class="signature-line"></div>
                    <div class="signature-label">Date of Issue</div>
                </div>
            </div>
            
            <div class="certificate-id">
                <div class="certificate-id-label">Certificate ID</div>
                <div class="certificate-id-value" th:text="${result.certificateId}"></div>
            </div>
        </div>
    </div>
</body>
</html>
